name: Sync canary + Mirror Upstream PRs

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  sync-canary:
    name: Sync canary Branch from Upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/vercel/next.js.git
          git fetch upstream
          git checkout -B canary upstream/canary
          git push origin canary --force

  mirror-prs:
    name: Mirror and Sync PRs
    needs: sync-canary
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node and install GitHub CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      - name: Set environment variables
        run: |
          echo "REPO_NAME=$(basename $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          echo "FORK_OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)" >> $GITHUB_ENV
          echo "UPSTREAM_OWNER=vercel" >> $GITHUB_ENV

      - name: Add upstream and fetch PRs
        run: |
          git remote add upstream https://github.com/${UPSTREAM_OWNER}/${REPO_NAME}.git
          git fetch upstream

      - name: Mirror open upstream PRs
        run: |
          PRS=$(gh pr list -R "${UPSTREAM_OWNER}/${REPO_NAME}" --state open --json number,headRefName,title,body --jq ".[] | @base64")

          for line in $PRS; do
            pr_info=$(echo "$line" | base64 --decode)
            pr_num=$(echo "$pr_info" | jq -r '.number')
            pr_branch=$(echo "$pr_info" | jq -r '.headRefName')
            pr_title=$(echo "$pr_info" | jq -r '.title')
            pr_body=$(echo "$pr_info" | jq -r '.body // ""')
          upstream_ref="refs/pull/$pr_num/head"

          echo "🔄 Processing upstream PR #$pr_num from branch '$pr_branch'..."

          # Fetch the upstream PR into a local branch
          git fetch upstream "$upstream_ref:$pr_branch" || {
            echo "❌ Failed to fetch upstream PR #$pr_num ($pr_branch)"
            continue
          }

          # Push the branch to your fork
          git push origin "$pr_branch" --force || {
            echo "❌ Failed to push $pr_branch to origin"
            continue
          }

          # Check if the PR has actual changes
          if git diff --quiet origin/canary origin/$pr_branch; then
            echo "⚠️ No changes between canary and $pr_branch — skipping PR"
            continue
          fi

          exists=$(gh pr list -R "$GITHUB_REPOSITORY" --state open --head "$pr_branch" --json number --jq '.[0].number')

          if [ -z "$exists" ]; then
            echo "✅ Creating fork PR for upstream PR #$pr_num"

            # Final verification that the branch exists remotely
            if git ls-remote origin "refs/heads/$pr_branch" | grep -q "$pr_branch"; then

              # Prepare the body with mirror info appended
              mirror_footer=$'\n\n---\n🔄 **This is a mirror of [upstream PR #'"$pr_num"'](https://github.com/'"${UPSTREAM_OWNER}"'/'"${REPO_NAME}"'/pull/'"$pr_num"')**'
              
              # Combine original body with mirror footer
              full_body="$pr_body$mirror_footer"
              
              gh pr create \
                -R "$GITHUB_REPOSITORY" \
                --base canary \
                --head "$pr_branch" \
                --title "$pr_title" \
                --body "$full_body" \
                || echo "❌ gh pr create failed for PR #$pr_num"
            else
              echo "❌ Remote branch $pr_branch not found on origin — skipping PR creation"
            fi

          else
            echo "ℹ️ Fork PR already exists for #$pr_num"
          fi
          done

      - name: Close mirrored fork PRs that are closed upstream
        run: |
          # Get all open upstream branch names
          echo "🔍 Getting list of open upstream branches..."
          upstream_open_branches=$(gh pr list -R "${UPSTREAM_OWNER}/${REPO_NAME}" --state open --json headRefName --jq -r -- '.[].headRefName')
          
          # Get all open PRs in your fork
          echo "🔍 Getting list of open fork PRs..."
          fork_prs=$(gh pr list --state open --json number,headRefName --jq -r -- '.[] | [.number, .headRefName] | @tsv')

          if [ -z "$fork_prs" ]; then
            echo "ℹ️ No open PRs found in fork"
            exit 0
          fi

          while IFS=$'\t' read -r fork_pr_num head_branch; do
            echo "🔍 Checking fork PR #$fork_pr_num with branch '$head_branch'..."
            
            # Check if this branch name exists in the list of open upstream branches
            if echo "$upstream_open_branches" | grep -Fxq "$head_branch"; then
              echo "✅ Fork PR #$fork_pr_num stays open (upstream branch '$head_branch' is still open)"
            else
              echo "🔒 Closing fork PR #$fork_pr_num (upstream branch '$head_branch' is no longer open)"
              gh pr close "$fork_pr_num" --delete-branch || echo "❌ Failed to close PR #$fork_pr_num"
            fi
          done <<< "$fork_prs"
